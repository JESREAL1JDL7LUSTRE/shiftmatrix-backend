version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  solver:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - REDIS_URL=redis://redis:6379/0
      - WEBHOOK_URL=http://host.docker.internal:3000/api/solver-webhook
      - WORKER_SECRET=${WORKER_SECRET:-my_super_secret_dev_key}
    depends_on:
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  redis_data:
